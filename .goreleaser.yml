version: 2

project_name: hdc

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - main: ./cmd
    binary: hdc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

brews:
  - name: hdc
    tap:
      owner: steffenrumpf
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    url_template: "https://github.com/steffenrumpf/hdc/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    folder: Formula
    caveats: |
      HDC is a standalone CLI tool for checking Helm chart dependencies.

      Quick start:
        hdc check helmfile.yaml

      For more information:
        https://github.com/steffenrumpf/hdc
    homepage: "https://github.com/steffenrumpf/hdc"
    description: "Helmfile Dependency Checker - Verify Helm chart dependencies are up-to-date and actively maintained"
    license: "Apache-2.0"
    test: |
      system "#{bin}/hdc", "version"
    install: |
      bin.install "hdc"

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Performance
      regexp: "^perf"
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs"
      - "^chore"
      - "^style"
      - "^ci"
