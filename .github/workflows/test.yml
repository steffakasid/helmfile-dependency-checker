---
name: Go Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.2

      - name: Run tests
        run: make test

      - name: Run integration tests
        run: make test-integration

      - name: Run linting
        run: make lint
