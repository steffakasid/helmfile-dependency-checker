repositories:
  - name: stable
    url: https://charts.helm.sh/stable
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: cert-manager
    url: https://charts.jetstack.io

releases:
  - name: nginx-ingress
    namespace: ingress
    chart: ingress-nginx/ingress-nginx
    version: 4.0.1

  - name: cert-manager
    namespace: cert-manager
    chart: cert-manager/cert-manager
    version: 1.10.0

  - name: postgresql
    namespace: database
    chart: bitnami/postgresql
    version: 11.6.0

  - name: redis
    namespace: cache
    chart: bitnami/redis
    version: 16.13.0

  - name: prometheus
    namespace: monitoring
    chart: stable/prometheus
    version: 11.16.9
